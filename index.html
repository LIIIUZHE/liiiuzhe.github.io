<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的GitHub主页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="animated-logo">✨</div>
            <h1>欢迎来到我的空间</h1>
        </div>
    </header>
    
    <main>
        <section class="intro">
            <h2>关于我</h2>
            <p>你好！我是一名开发者，这是我的GitHub Pages主页。</p>
            <button id="surpriseBtn">点我有惊喜</button>
        </section>
        
        <section class="projects">
            <h2>我的项目</h2>
            <div class="project-cards">
                <div class="card">
                    <h3>项目一</h3>
                    <p>这是我的第一个项目描述</p>
                </div>
                <div class="card">
                    <h3>项目二</h3>
                    <p>这是我的第二个项目描述</p>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <p>© 2023 我的GitHub主页 | 使用GitHub Pages托管</p>
    </footer>
    
    <script src="scripts.js"></script>
</body>
</html>
